version: "3.9"

services:
  nextcloud:
    image: docker.io/nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: changeme
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: ${DOMAIN}
      REDIS_HOST: redis
    ports:
      - "127.0.0.1:${PORT:-8083}:80"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/nextcloud_data:/var/www/html
    networks:
      - ${TENANT}_${POD}_nextcloud_net

  mysql:
    image: docker.io/mariadb:11
    container_name: nextcloud_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: changeme
      MYSQL_ROOT_PASSWORD: changeme
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ${TENANT}_${POD}_nextcloud_net

  redis:
    image: docker.io/redis:7
    container_name: nextcloud_redis
    restart: unless-stopped
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/redis_data:/data
    networks:
      - ${TENANT}_${POD}_nextcloud_net

networks:
  ${TENANT}_${POD}_nextcloud_net:
    driver: bridge
