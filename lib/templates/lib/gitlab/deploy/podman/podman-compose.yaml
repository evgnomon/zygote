version: "3.9"

services:
  gitlab:
    image: docker.io/gitlab/gitlab-ce:latest
    container_name: gitlab
    restart: unless-stopped
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://${DOMAIN}:${PORT:-8929}'
        gitlab_rails['gitlab_shell_ssh_port'] = 2224
    ports:
      - "127.0.0.1:${PORT:-8929}:8929"
      - "127.0.0.1:2224:22"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/gitlab_config:/etc/gitlab
      - /mnt/z/volumes/${TENANT}/${POD}/gitlab_logs:/var/log/gitlab
      - /mnt/z/volumes/${TENANT}/${POD}/gitlab_data:/var/opt/gitlab
    networks:
      - ${TENANT}_${POD}_gitlab_net

networks:
  ${TENANT}_${POD}_gitlab_net:
    driver: bridge
