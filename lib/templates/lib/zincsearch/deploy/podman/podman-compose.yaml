version: "3.9"

services:
  zincsearch:
    image: docker.io/public.ecr.aws/zinclabs/zincsearch:latest
    container_name: zincsearch
    restart: unless-stopped
    environment:
      ZINC_FIRST_ADMIN_USER: admin
      ZINC_FIRST_ADMIN_PASSWORD: changeme
      ZINC_DATA_PATH: /data
    ports:
      - "127.0.0.1:${PORT:-4080}:4080"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/zincsearch_data:/data
    networks:
      - ${TENANT}_${POD}_zincsearch_net

networks:
  ${TENANT}_${POD}_zincsearch_net:
    driver: bridge
