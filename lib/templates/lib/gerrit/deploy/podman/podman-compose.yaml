version: "3.9"

services:
  gerrit:
    image: docker.io/gerritcodereview/gerrit:latest
    container_name: ${TENANT}_${NAMESPACE}_${POD}_gerrit
    restart: unless-stopped
    entrypoint: ["/var/gerrit/entrypoint.sh"]
    environment:
      CANONICAL_WEB_URL: ${CANONICAL_WEB_URL}
      HTTPD_LISTEN_URL: proxy-https://*:8080/
    ports:
      - "127.0.0.1:${PORT}:8080"
      - "127.0.0.1:${SSH_PORT}:29418"
    volumes:
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/gerrit_git:/var/gerrit/git
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/gerrit_index:/var/gerrit/index
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/gerrit_cache:/var/gerrit/cache
      - ../scripts/entrypoint.sh:/var/gerrit/entrypoint.sh:ro
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/gerrit_etc:/var/gerrit/etc
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/gerrit_db:/var/gerrit/db
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/gerrit_logs:/var/gerrit/logs
    networks:
      - z-${TENANT}-${NAMESPACE}-${POD}
      - z-${TENANT}

networks:
  z-${TENANT}-${NAMESPACE}-${POD}:
    external: true
  z-${TENANT}-${NAMESPACE}:
    external: true
  z-${TENANT}:
    external: true
