version: "3.9"

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    command: --port 4000
    environment:
      LITELLM_MASTER_KEY: sk-changeme
      DATABASE_URL: postgresql://litellm:changeme@postgresql:5432/litellm
    ports:
      - "127.0.0.1:${PORT:-4000}:4000"
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/litellm_config:/app/config
    networks:
      - ${TENANT}_${POD}_litellm_net

  postgresql:
    image: docker.io/postgres:16
    container_name: litellm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: changeme
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ${TENANT}_${POD}_litellm_net

networks:
  ${TENANT}_${POD}_litellm_net:
    driver: bridge
