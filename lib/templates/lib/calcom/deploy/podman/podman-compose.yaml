version: "3.9"

services:
  calcom:
    image: docker.io/calcom/cal.com:latest
    container_name: ${TENANT}_${NAMESPACE}_${POD}_calcom
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgresql}:5432/calcom
      DATABASE_DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgresql}:5432/calcom
      NEXT_PUBLIC_WEBAPP_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      CALENDSO_ENCRYPTION_KEY: ${CALENDSO_ENCRYPTION_KEY}
    ports:
      - "127.0.0.1:${PORT}:3000"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - z-${TENANT}-${NAMESPACE}-${POD}
      - z-${TENANT}

  postgresql:
    image: docker.io/postgres:16
    container_name: ${TENANT}_${NAMESPACE}_${POD}_postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: calcom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - z-${TENANT}-${NAMESPACE}-${POD}

networks:
  z-${TENANT}-${NAMESPACE}-${POD}:
    external: true
  z-${TENANT}-${NAMESPACE}:
    external: true
  z-${TENANT}:
    external: true
