version: "3.9"

services:
  registry:
    image: docker.io/registry:2
    container_name: ${TENANT}_${NAMESPACE}_${POD}_registry
    restart: unless-stopped
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: Registry Realm
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    ports:
      - "127.0.0.1:${PORT}:5000"
    volumes:
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/auth:/auth:ro
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/registry_data:/var/lib/registry
    networks:
      - z-${TENANT}-${NAMESPACE}-${POD}
      - z-${TENANT}

networks:
  z-${TENANT}-${NAMESPACE}-${POD}:
    external: true
  z-${TENANT}-${NAMESPACE}:
    external: true
  z-${TENANT}:
    external: true
