version: "3.9"

services:
  chatwoot:
    image: docker.io/chatwoot/chatwoot:latest
    container_name: chatwoot
    restart: unless-stopped
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    environment:
      SECRET_KEY_BASE: changeme_generate_a_real_secret
      FRONTEND_URL: http://${DOMAIN}:${PORT:-3002}
      POSTGRES_HOST: postgresql
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: changeme
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://redis:6379
      RAILS_ENV: production
    ports:
      - "127.0.0.1:${PORT:-3002}:3000"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/chatwoot_storage:/app/storage
    networks:
      - ${TENANT}_${POD}_chatwoot_net

  chatwoot-sidekiq:
    image: docker.io/chatwoot/chatwoot:latest
    container_name: chatwoot_sidekiq
    restart: unless-stopped
    command: bundle exec sidekiq -C config/sidekiq.yml
    environment:
      SECRET_KEY_BASE: changeme_generate_a_real_secret
      POSTGRES_HOST: postgresql
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: changeme
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://redis:6379
      RAILS_ENV: production
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/chatwoot_storage:/app/storage
    networks:
      - ${TENANT}_${POD}_chatwoot_net

  postgresql:
    image: docker.io/postgres:16
    container_name: chatwoot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_PASSWORD: changeme
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ${TENANT}_${POD}_chatwoot_net

  redis:
    image: docker.io/redis:7
    container_name: chatwoot_redis
    restart: unless-stopped
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/redis_data:/data
    networks:
      - ${TENANT}_${POD}_chatwoot_net

networks:
  ${TENANT}_${POD}_chatwoot_net:
    driver: bridge
