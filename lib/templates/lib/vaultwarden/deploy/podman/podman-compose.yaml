version: "3.9"

services:
  vaultwarden:
    image: docker.io/vaultwarden/server:latest
    container_name: ${TENANT}_${NAMESPACE}_${POD}_vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: https://${DOMAIN}
      SIGNUPS_ALLOWED: "false"
      INVITATIONS_ALLOWED: "true"
      ADMIN_TOKEN: ${ADMIN_TOKEN}
    ports:
      - "127.0.0.1:${PORT}:80"
    volumes:
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/vaultwarden_data:/data
    networks:
      - z-${TENANT}-${NAMESPACE}-${POD}
      - z-${TENANT}

networks:
  z-${TENANT}-${NAMESPACE}-${POD}:
    external: true
  z-${TENANT}-${NAMESPACE}:
    external: true
  z-${TENANT}:
    external: true
