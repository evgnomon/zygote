version: "3.9"

services:
  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:latest
    container_name: ${TENANT}_${NAMESPACE}_${POD}_rocketchat
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://${MONGODB_HOST:-mongodb}:27017/rocketchat
      MONGO_OPLOG_URL: mongodb://${MONGODB_HOST:-mongodb}:27017/local
      ROOT_URL: https://${DOMAIN}
      PORT: "3000"
      DEPLOY_METHOD: docker
      DEPLOY_PLATFORM: ""
      OVERWRITE_SETTING_Accounts_EmailVerification: "false"
    ports:
      - "127.0.0.1:${PORT}:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - z-${TENANT}-${NAMESPACE}-${POD}
      - z-${TENANT}

  mongodb:
    image: mongo:7.0
    container_name: ${TENANT}_${NAMESPACE}_${POD}_mongodb
    restart: unless-stopped
    command: mongod --oplogSize 128 --replSet rs0
    volumes:
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/mongo_backup:/data/backup
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/mongo_data:/data/db
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/mongo_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - z-${TENANT}-${NAMESPACE}-${POD}

  mongo-init-replica:
    image: mongo:7.0
    container_name: ${TENANT}_${NAMESPACE}_${POD}_mongo_init
    restart: "no"
    command: >
      mongosh --host ${MONGODB_HOST:-mongodb}:27017 --eval
      "rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '${MONGODB_HOST:-mongodb}:27017' }] })"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - z-${TENANT}-${NAMESPACE}-${POD}

networks:
  z-${TENANT}-${NAMESPACE}-${POD}:
    external: true
  z-${TENANT}-${NAMESPACE}:
    external: true
  z-${TENANT}:
    external: true
