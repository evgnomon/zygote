version: "3.9"

services:
  postgresql:
    image: docker.io/postgres:16
    container_name: postgresql
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: changeme
    ports:
      - "127.0.0.1:${PORT:-5432}:5432"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/postgresql_data:/var/lib/postgresql/data
    networks:
      - ${TENANT}_${POD}_postgresql_net

networks:
  ${TENANT}_${POD}_postgresql_net:
    driver: bridge
