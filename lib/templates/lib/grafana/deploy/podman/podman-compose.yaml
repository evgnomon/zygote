version: "3.9"

services:
  grafana:
    image: docker.io/grafana/grafana-oss:latest
    container_name: ${TENANT}_${NAMESPACE}_${POD}_grafana
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: https://${DOMAIN}
      GF_SERVER_HTTP_PORT: "3000"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "127.0.0.1:${PORT}:3000"
    volumes:
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/grafana_data:/var/lib/grafana
    networks:
      - z-${TENANT}-${NAMESPACE}-${POD}
      - z-${TENANT}

networks:
  z-${TENANT}-${NAMESPACE}-${POD}:
    external: true
  z-${TENANT}:
    external: true
