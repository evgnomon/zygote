version: "3.9"

services:
  plausible:
    image: ghcr.io/plausible/community-edition:latest
    container_name: plausible
    restart: unless-stopped
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    environment:
      BASE_URL: http://${DOMAIN}:${PORT:-8000}
      SECRET_KEY_BASE: changeme_generate_a_64_byte_secret_key_base_here_placeholder00
      DATABASE_URL: postgres://postgres:changeme@postgresql:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://clickhouse:8123/plausible
    ports:
      - "127.0.0.1:${PORT:-8000}:8000"
    depends_on:
      postgresql:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - ${TENANT}_${POD}_plausible_net

  postgresql:
    image: docker.io/postgres:16
    container_name: plausible_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: plausible
      POSTGRES_PASSWORD: changeme
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ${TENANT}_${POD}_plausible_net

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:latest
    container_name: plausible_clickhouse
    restart: unless-stopped
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/clickhouse_data:/var/lib/clickhouse
      - /mnt/z/volumes/${TENANT}/${POD}/clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ${TENANT}_${POD}_plausible_net

networks:
  ${TENANT}_${POD}_plausible_net:
    driver: bridge
