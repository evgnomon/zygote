version: "3.9"

services:
  twenty:
    image: docker.io/twentycrm/twenty:latest
    container_name: twenty
    restart: unless-stopped
    environment:
      PG_DATABASE_URL: postgresql://postgres:changeme@postgresql:5432/twenty
      REDIS_URL: redis://redis:6379
      APP_SECRET: changeme_generate_a_real_secret
      SERVER_URL: http://${DOMAIN}:${PORT:-3000}
      FRONT_BASE_URL: http://${DOMAIN}:${PORT:-3000}
      ENABLE_DB_MIGRATIONS: "true"
      SIGN_IN_PREFILLED: "true"
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: .local-storage
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/twenty_local_storage:/app/packages/twenty-server/.local-storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ${TENANT}_${POD}_twenty_net

  twenty-worker:
    image: docker.io/twentycrm/twenty:latest
    container_name: twenty_worker
    restart: unless-stopped
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgresql://postgres:changeme@postgresql:5432/twenty
      REDIS_URL: redis://redis:6379
      APP_SECRET: changeme_generate_a_real_secret
      SERVER_URL: http://${DOMAIN}:${PORT:-3000}
      FRONT_BASE_URL: http://${DOMAIN}:${PORT:-3000}
      ENABLE_DB_MIGRATIONS: "false"
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: .local-storage
    depends_on:
      postgresql:
        condition: service_healthy
      twenty:
        condition: service_healthy
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/twenty_local_storage:/app/packages/twenty-server/.local-storage
    networks:
      - ${TENANT}_${POD}_twenty_net

  postgresql:
    image: docker.io/postgres:16
    container_name: twenty_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: twenty
      POSTGRES_PASSWORD: changeme
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ${TENANT}_${POD}_twenty_net

  redis:
    image: docker.io/redis:latest
    container_name: twenty_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ${TENANT}_${POD}_twenty_net

networks:
  ${TENANT}_${POD}_twenty_net:
    driver: bridge
