version: "3.9"

services:
  jupyter:
    image: docker.io/jupyter/scipy-notebook:latest
    container_name: jupyter
    restart: unless-stopped
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    ports:
      - "127.0.0.1:${PORT:-8888}:8888"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/jupyter_data:/home/jovyan/work
    networks:
      - ${TENANT}_${POD}_jupyter_net

networks:
  ${TENANT}_${POD}_jupyter_net:
    driver: bridge
