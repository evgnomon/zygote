version: "3.9"

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: ${TENANT}_${NAMESPACE}_${POD}_keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${POSTGRES_HOST:-postgresql}:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME: ${DOMAIN}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:${PORT}:8080"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - z-${TENANT}-${NAMESPACE}-${POD}
      - z-${TENANT}

  postgresql:
    image: docker.io/postgres:16
    container_name: ${TENANT}_${NAMESPACE}_${POD}_postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - /mnt/z/volumes/${TENANT}/${NAMESPACE}/${POD}/postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - z-${TENANT}-${NAMESPACE}-${POD}

networks:
  z-${TENANT}-${NAMESPACE}-${POD}:
    external: true
  z-${TENANT}-${NAMESPACE}:
    external: true
  z-${TENANT}:
    external: true
