version: "3.9"

services:
  mattermost:
    image: docker.io/mattermost/mattermost-team-edition:latest
    container_name: mattermost
    restart: unless-stopped
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mattermost:changeme@postgresql:5432/mattermost?sslmode=disable
      MM_SERVICESETTINGS_SITEURL: http://${DOMAIN}:${PORT:-8065}
    ports:
      - "127.0.0.1:${PORT:-8065}:8065"
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/mattermost_config:/mattermost/config
      - /mnt/z/volumes/${TENANT}/${POD}/mattermost_data:/mattermost/data
      - /mnt/z/volumes/${TENANT}/${POD}/mattermost_logs:/mattermost/logs
      - /mnt/z/volumes/${TENANT}/${POD}/mattermost_plugins:/mattermost/plugins
    networks:
      - ${TENANT}_${POD}_mattermost_net

  postgresql:
    image: docker.io/postgres:16
    container_name: mattermost_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mattermost
      POSTGRES_USER: mattermost
      POSTGRES_PASSWORD: changeme
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mattermost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ${TENANT}_${POD}_mattermost_net

networks:
  ${TENANT}_${POD}_mattermost_net:
    driver: bridge
