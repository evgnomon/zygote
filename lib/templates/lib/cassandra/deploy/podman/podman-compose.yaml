version: "3.9"

services:
  cassandra:
    image: docker.io/cassandra:latest
    container_name: cassandra
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: PlatForgeCluster
    ports:
      - "127.0.0.1:${PORT:-9042}:9042"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/cassandra_data:/var/lib/cassandra
    networks:
      - ${TENANT}_${POD}_cassandra_net

networks:
  ${TENANT}_${POD}_cassandra_net:
    driver: bridge
