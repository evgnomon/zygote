version: "3.9"

services:
  vllm:
    image: docker.io/vllm/vllm-openai:latest
    container_name: vllm
    restart: unless-stopped
    command: --model meta-llama/Llama-3.1-8B-Instruct --host 0.0.0.0 --port 8000
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    ports:
      - "127.0.0.1:${PORT:-8001}:8000"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/vllm_cache:/root/.cache/huggingface
    networks:
      - ${TENANT}_${POD}_vllm_net

networks:
  ${TENANT}_${POD}_vllm_net:
    driver: bridge
