version: "3.9"

services:
  tabby:
    image: docker.io/tabbyml/tabby:latest
    container_name: tabby
    restart: unless-stopped
    command: serve --model StarCoder-1B --device cpu
    ports:
      - "127.0.0.1:${PORT:-8091}:8080"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/tabby_data:/data
    networks:
      - ${TENANT}_${POD}_tabby_net

networks:
  ${TENANT}_${POD}_tabby_net:
    driver: bridge
