version: "3.9"

services:
  discourse:
    image: docker.io/bitnami/discourse:latest
    container_name: discourse
    restart: unless-stopped
    environment:
      DISCOURSE_HOST: ${DOMAIN}
      DISCOURSE_DATABASE_HOST: postgresql
      DISCOURSE_DATABASE_PORT_NUMBER: "5432"
      DISCOURSE_DATABASE_USER: discourse
      DISCOURSE_DATABASE_PASSWORD: changeme
      DISCOURSE_DATABASE_NAME: discourse
      DISCOURSE_REDIS_HOST: redis
      DISCOURSE_REDIS_PORT_NUMBER: "6379"
      DISCOURSE_USERNAME: admin
      DISCOURSE_PASSWORD: changeme123
      DISCOURSE_EMAIL: admin@example.com
    ports:
      - "127.0.0.1:${PORT:-8085}:3000"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/discourse_data:/bitnami/discourse
    networks:
      - ${TENANT}_${POD}_discourse_net

  discourse-sidekiq:
    image: docker.io/bitnami/discourse:latest
    container_name: discourse_sidekiq
    restart: unless-stopped
    command: /opt/bitnami/scripts/discourse-sidekiq/run.sh
    environment:
      DISCOURSE_HOST: ${DOMAIN}
      DISCOURSE_DATABASE_HOST: postgresql
      DISCOURSE_DATABASE_PORT_NUMBER: "5432"
      DISCOURSE_DATABASE_USER: discourse
      DISCOURSE_DATABASE_PASSWORD: changeme
      DISCOURSE_DATABASE_NAME: discourse
      DISCOURSE_REDIS_HOST: redis
      DISCOURSE_REDIS_PORT_NUMBER: "6379"
    depends_on:
      discourse:
        condition: service_started
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/discourse_data:/bitnami/discourse
    networks:
      - ${TENANT}_${POD}_discourse_net

  postgresql:
    image: docker.io/postgres:16
    container_name: discourse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: discourse
      POSTGRES_USER: discourse
      POSTGRES_PASSWORD: changeme
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "discourse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ${TENANT}_${POD}_discourse_net

  redis:
    image: docker.io/redis:7
    container_name: discourse_redis
    restart: unless-stopped
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/redis_data:/data
    networks:
      - ${TENANT}_${POD}_discourse_net

networks:
  ${TENANT}_${POD}_discourse_net:
    driver: bridge
