version: "3.9"

services:
  ferretdb:
    image: ghcr.io/ferretdb/ferretdb:latest
    container_name: ferretdb
    restart: unless-stopped
    environment:
      FERRETDB_POSTGRESQL_URL: postgres://postgresql:5432/ferretdb
    ports:
      - "127.0.0.1:${PORT:-27017}:27017"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - ${TENANT}_${POD}_ferretdb_net

  postgresql:
    image: docker.io/postgres:16
    container_name: ferretdb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ferretdb
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/ferretdb_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ${TENANT}_${POD}_ferretdb_net

networks:
  ${TENANT}_${POD}_ferretdb_net:
    driver: bridge
