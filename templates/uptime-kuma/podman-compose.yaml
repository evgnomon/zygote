version: "3.9"

services:
  uptime-kuma:
    image: docker.io/louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-3001}:3001"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/uptime-kuma_data:/app/data
    networks:
      - ${TENANT}_${POD}_uptime-kuma_net

networks:
  ${TENANT}_${POD}_uptime-kuma_net:
    driver: bridge
