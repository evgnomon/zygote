version: "3.9"

services:
  mailcow-postfix:
    image: docker.io/mailcow/postfix:latest
    container_name: mailcow_postfix
    restart: unless-stopped
    ports:
      - "127.0.0.1:25:25"
      - "127.0.0.1:465:465"
      - "127.0.0.1:587:587"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/postfix_data:/var/spool/postfix
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ${TENANT}_${POD}_mailcow_net

  mailcow-dovecot:
    image: docker.io/mailcow/dovecot:latest
    container_name: mailcow_dovecot
    restart: unless-stopped
    ports:
      - "127.0.0.1:143:143"
      - "127.0.0.1:993:993"
      - "127.0.0.1:110:110"
      - "127.0.0.1:995:995"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/vmail_data:/var/vmail
      - /mnt/z/volumes/${TENANT}/${POD}/dovecot_data:/var/lib/dovecot
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ${TENANT}_${POD}_mailcow_net

  mailcow-ui:
    image: docker.io/mailcow/phpfpm:latest
    container_name: mailcow_ui
    restart: unless-stopped
    environment:
      DBNAME: mailcow
      DBUSER: mailcow
      DBPASS: changeme
      DBHOST: mysql
      REDIS_SLAVEOF_IP: redis
      MAILCOW_HOSTNAME: ${DOMAIN}
    ports:
      - "127.0.0.1:${PORT:-8088}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ${TENANT}_${POD}_mailcow_net

  mysql:
    image: docker.io/mariadb:11
    container_name: mailcow_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mailcow
      MYSQL_USER: mailcow
      MYSQL_PASSWORD: changeme
      MYSQL_ROOT_PASSWORD: changeme
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ${TENANT}_${POD}_mailcow_net

  redis:
    image: docker.io/redis:7
    container_name: mailcow_redis
    restart: unless-stopped
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/redis_data:/data
    networks:
      - ${TENANT}_${POD}_mailcow_net

networks:
  ${TENANT}_${POD}_mailcow_net:
    driver: bridge
