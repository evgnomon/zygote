version: "3.9"

services:
  fluent-bit:
    image: docker.io/fluent/fluent-bit:latest
    container_name: fluent-bit
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-2020}:2020"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/fluent-bit_data:/fluent-bit/etc
    networks:
      - ${TENANT}_${POD}_fluent-bit_net

networks:
  ${TENANT}_${POD}_fluent-bit_net:
    driver: bridge
