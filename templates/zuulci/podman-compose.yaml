version: "3.9"

services:
  zuul-scheduler:
    image: quay.io/zuul-ci/zuul-scheduler:latest
    container_name: zuul_scheduler
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/zuul_config:/etc/zuul
      - /mnt/z/volumes/${TENANT}/${POD}/zuul_scheduler:/var/lib/zuul
    networks:
      - ${TENANT}_${POD}_zuulci_net

  zuul-web:
    image: quay.io/zuul-ci/zuul-web:latest
    container_name: zuul_web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-9000}:9000"
    depends_on:
      - zuul-scheduler
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/zuul_config:/etc/zuul
    networks:
      - ${TENANT}_${POD}_zuulci_net

  zuul-executor:
    image: quay.io/zuul-ci/zuul-executor:latest
    container_name: zuul_executor
    restart: unless-stopped
    depends_on:
      - zuul-scheduler
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/zuul_config:/etc/zuul
      - /mnt/z/volumes/${TENANT}/${POD}/zuul_executor:/var/lib/zuul
    networks:
      - ${TENANT}_${POD}_zuulci_net

  zuul-merger:
    image: quay.io/zuul-ci/zuul-merger:latest
    container_name: zuul_merger
    restart: unless-stopped
    depends_on:
      - zuul-scheduler
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/zuul_config:/etc/zuul
      - /mnt/z/volumes/${TENANT}/${POD}/zuul_merger:/var/lib/zuul
    networks:
      - ${TENANT}_${POD}_zuulci_net

  nodepool-launcher:
    image: quay.io/zuul-ci/nodepool-launcher:latest
    container_name: zuul_nodepool
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/nodepool_config:/etc/nodepool
    networks:
      - ${TENANT}_${POD}_zuulci_net

  zookeeper:
    image: docker.io/zookeeper:latest
    container_name: zuul_zookeeper
    restart: unless-stopped
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/zookeeper_data:/data
      - /mnt/z/volumes/${TENANT}/${POD}/zookeeper_datalog:/datalog
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ${TENANT}_${POD}_zuulci_net

networks:
  ${TENANT}_${POD}_zuulci_net:
    driver: bridge
