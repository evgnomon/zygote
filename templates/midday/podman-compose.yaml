version: "3.9"

services:
  midday:
    build:
      context: https://github.com/midday-ai/midday.git
      dockerfile: apps/dashboard/Dockerfile
    image: midday:latest
    container_name: midday
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://supabase-kong:8000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: changeme_generate_supabase_anon_key
      SUPABASE_SERVICE_KEY: changeme_generate_supabase_service_key
    ports:
      - "127.0.0.1:${PORT:-3005}:3000"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - ${TENANT}_${POD}_midday_net

  postgresql:
    image: docker.io/pgvector/pgvector:pg16
    container_name: midday_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: midday
      POSTGRES_PASSWORD: changeme
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ${TENANT}_${POD}_midday_net

  redis:
    image: docker.io/redis:latest
    container_name: midday_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ${TENANT}_${POD}_midday_net

networks:
  ${TENANT}_${POD}_midday_net:
    driver: bridge
