version: "3.9"

services:
  opensearch:
    image: docker.io/opensearchproject/opensearch:latest
    container_name: opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:${PORT:-9200}:9200"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/opensearch_data:/usr/share/opensearch/data
    networks:
      - ${TENANT}_${POD}_opensearch_net

networks:
  ${TENANT}_${POD}_opensearch_net:
    driver: bridge
