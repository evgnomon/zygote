version: "3.9"

services:
  rabbitmq:
    image: docker.io/rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: changeme
    ports:
      - "127.0.0.1:${PORT:-5672}:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ${TENANT}_${POD}_rabbitmq_net

networks:
  ${TENANT}_${POD}_rabbitmq_net:
    driver: bridge
