version: "3.9"

services:
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-11434}:11434"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/ollama_data:/root/.ollama
    networks:
      - ${TENANT}_${POD}_ollama_net

networks:
  ${TENANT}_${POD}_ollama_net:
    driver: bridge
