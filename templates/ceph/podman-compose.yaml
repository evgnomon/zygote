version: "3.9"

services:
  ceph:
    image: quay.io/ceph/daemon:latest
    container_name: ceph
    restart: unless-stopped
    environment:
      CEPH_DAEMON: demo
      MON_IP: 127.0.0.1
      CEPH_PUBLIC_NETWORK: 0.0.0.0/0
      DEMO_DAEMONS: mon,mgr,osd,rgw
    ports:
      - "127.0.0.1:${PORT:-8443}:8443"
      - "127.0.0.1:7480:7480"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/ceph_etc:/etc/ceph
      - /mnt/z/volumes/${TENANT}/${POD}/ceph_lib:/var/lib/ceph
    networks:
      - ${TENANT}_${POD}_ceph_net

networks:
  ${TENANT}_${POD}_ceph_net:
    driver: bridge
