version: "3.9"

services:
  master:
    image: docker.io/chrislusf/seaweedfs:latest
    container_name: seaweedfs_master
    restart: unless-stopped
    command: master -ip=master -port=9333
    ports:
      - "127.0.0.1:${PORT:-9333}:9333"
      - "127.0.0.1:19333:19333"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/master_data:/data
    networks:
      - ${TENANT}_${POD}_seaweedfs_net

  volume:
    image: docker.io/chrislusf/seaweedfs:latest
    container_name: seaweedfs_volume
    restart: unless-stopped
    command: volume -mserver=master:9333 -port=8080 -ip=volume -max=100
    depends_on:
      - master
    ports:
      - "127.0.0.1:8089:8080"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/volume_data:/data
    networks:
      - ${TENANT}_${POD}_seaweedfs_net

  filer:
    image: docker.io/chrislusf/seaweedfs:latest
    container_name: seaweedfs_filer
    restart: unless-stopped
    command: filer -master=master:9333 -port=8888
    depends_on:
      - master
      - volume
    ports:
      - "127.0.0.1:8890:8888"
      - "127.0.0.1:18888:18888"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/filer_data:/data
    networks:
      - ${TENANT}_${POD}_seaweedfs_net

  s3:
    image: docker.io/chrislusf/seaweedfs:latest
    container_name: seaweedfs_s3
    restart: unless-stopped
    command: s3 -filer=filer:8888 -port=8333
    depends_on:
      - filer
    ports:
      - "127.0.0.1:8333:8333"
    networks:
      - ${TENANT}_${POD}_seaweedfs_net

networks:
  ${TENANT}_${POD}_seaweedfs_net:
    driver: bridge
