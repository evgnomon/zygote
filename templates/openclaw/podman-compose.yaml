version: "3.9"

services:
  openclaw:
    image: docker.io/alpine/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-18789}:18789"
      - "127.0.0.1:18790:18790"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/openclaw_config:/root/.openclaw
      - /mnt/z/volumes/${TENANT}/${POD}/openclaw_workspace:/root/openclaw/workspace
    networks:
      - ${TENANT}_${POD}_openclaw_net

networks:
  ${TENANT}_${POD}_openclaw_net:
    driver: bridge
