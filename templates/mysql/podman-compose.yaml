version: "3.9"

services:
  mysql:
    image: docker.io/mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: changeme
    ports:
      - "127.0.0.1:${PORT:-3306}:3306"
    volumes:
      - /mnt/z/volumes/${TENANT}/${POD}/mysql_data:/var/lib/mysql
    networks:
      - ${TENANT}_${POD}_mysql_net

networks:
  ${TENANT}_${POD}_mysql_net:
    driver: bridge
